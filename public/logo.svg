<svg width="1200" height="400" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gradText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Icon: Chat + Code -->
  <g transform="translate(30,40)">
    <rect x="0" y="0" width="120" height="90" rx="20" fill="url(#gradText)"/>
    <polygon points="30,90 60,90 40,120" fill="url(#gradText)"/>

    <!-- Code symbol -->
    <text x="28" y="55" font-size="36" fill="white" font-family="monospace">
      &lt;/&gt;
    </text>
  </g>

  <!-- Community nodes -->
  <g transform="translate(200,70)" stroke="url(#gradText)" stroke-width="3" fill="none">
    <circle cx="0" cy="0" r="14" fill="#6366f1"/>
    <circle cx="60" cy="40" r="14" fill="#06b6d4"/>
    <circle cx="-60" cy="40" r="14" fill="#6366f1"/>

    <line x1="0" y1="0" x2="60" y2="40"/>
    <line x1="0" y1="0" x2="-60" y2="40"/>
    <line x1="-60" y1="40" x2="60" y2="40"/>
  </g>

  <!-- Brand Name -->
  <text x="340" y="140" font-size="72" font-weight="600" fill="url(#gradText)" font-family="Inter, Arial, sans-serif">
    DevsTalks
  </text>

</svg>
